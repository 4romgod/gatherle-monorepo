name: CodeQL

on:
  pull_request:
    branches: ['main']

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extractable TypeScript targets
        env:
          NEXTAUTH_SECRET: placeholder-nextauth-secret
          NEXT_PUBLIC_GRAPHQL_URL: https://example.invalid/v1/graphql
          NEXT_PUBLIC_WEBSOCKET_URL: wss://example.invalid/realtime
        run: |
          npm run build:ts -w @gatherle/commons
          npm run build:ts -w @gatherle/api
          npm run emit-schema -w @gatherle/api
          npm run codegen -w @gatherle/webapp
          npm run build:ts -w @gatherle/webapp
          npm run build:ts -w @gatherle/cdk

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
