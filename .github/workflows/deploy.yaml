name: Deploy

on:
  workflow_call:
    inputs:
      build_mobile:
        description: "Whether to build and publish the Android APK"
        required: false
        default: true
        type: boolean
      deploy_api:
        description: "Whether to deploy API infrastructure/runtime and run API e2e tests"
        required: false
        default: true
        type: boolean
      deploy_webapp:
        description: "Whether to deploy the webapp and run webapp e2e tests"
        required: false
        default: true
        type: boolean
      stage:
        description: "Application stage (example: Beta, Prod)"
        required: true
        type: string
      region:
        description: "AWS region (example: eu-west-1)"
        required: true
        type: string
      web_domain_alias:
        description: "Optional webapp custom domain alias (example: beta.gatherle.com)"
        required: false
        default: ""
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  resolve-deploy-context:
    if: ${{ !inputs.deploy_api && (inputs.deploy_webapp || inputs.build_mobile) }}
    runs-on: ubuntu-latest
    environment: ${{ format('{0}-{1}', inputs.stage, inputs.region) }}
    env:
      STAGE: ${{ inputs.stage }}
      AWS_REGION: ${{ inputs.region }}
    outputs:
      graphql_url: ${{ steps.get_graphql_endpoint.outputs.graphql_url }}
      websocket_url: ${{ steps.get_websocket_endpoint.outputs.websocket_url }}
      s3_media_url: ${{ steps.get_s3_bucket_url.outputs.s3_media_url }}
      media_cdn_url: ${{ steps.get_s3_bucket_url.outputs.media_cdn_url }}
      stack_suffix: ${{ steps.derive_suffix.outputs.stack_suffix }}
    steps:
      - name: Validate Deployment Configuration
        env:
          ASSUME_ROLE_ARN: ${{ secrets.ASSUME_ROLE_ARN }}
        run: |
          test -n "${{ inputs.stage }}" || (echo "Missing required input: stage" && exit 1)
          test -n "${{ inputs.region }}" || (echo "Missing required input: region" && exit 1)
          test -n "$ASSUME_ROLE_ARN" || (echo "Missing ASSUME_ROLE_ARN secret for target environment" && exit 1)

      - name: Derive Deployment Suffix
        id: derive_suffix
        run: |
          STAGE_SEGMENT=$(echo "$STAGE" | tr '[:upper:]' '[:lower:]')
          STACK_SUFFIX="${STAGE_SEGMENT}-${AWS_REGION}"
          echo "STACK_SUFFIX=$STACK_SUFFIX" >> "$GITHUB_ENV"
          echo "stack_suffix=$STACK_SUFFIX" >> "$GITHUB_OUTPUT"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.ASSUME_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get API Gateway endpoint
        id: get_graphql_endpoint
        run: |
          ENDPOINT=$(aws cloudformation describe-stacks --stack-name "gatherle-graphql-${STACK_SUFFIX}" --query "Stacks[0].Outputs[?OutputKey=='apiPath'].OutputValue" --output text)
          if [ -z "$ENDPOINT" ] || [ "$ENDPOINT" = "None" ]; then
            echo "Failed to retrieve GraphQL endpoint from gatherle-graphql-${STACK_SUFFIX} output apiPath."
            exit 1
          fi
          echo "graphql_url=$ENDPOINT" >> "$GITHUB_OUTPUT"

      - name: Get WebSocket API endpoint
        id: get_websocket_endpoint
        run: |
          WS_ENDPOINT=$(aws cloudformation describe-stacks --stack-name "gatherle-websocket-api-${STACK_SUFFIX}" --query "Stacks[0].Outputs[?OutputKey=='websocketApiUrl'].OutputValue" --output text)
          if [ -z "$WS_ENDPOINT" ] || [ "$WS_ENDPOINT" = "None" ]; then
            echo "Failed to retrieve WebSocket endpoint from gatherle-websocket-api-${STACK_SUFFIX} output websocketApiUrl."
            exit 1
          fi
          echo "websocket_url=$WS_ENDPOINT" >> "$GITHUB_OUTPUT"

      - name: Get S3 Media Bucket URL
        id: get_s3_bucket_url
        run: |
          BUCKET_NAME=$(aws cloudformation describe-stacks --stack-name "gatherle-s3-bucket-${STACK_SUFFIX}" --query "Stacks[0].Outputs[?OutputKey=='MediaBucketName'].OutputValue" --output text)
          if [ -z "$BUCKET_NAME" ] || [ "$BUCKET_NAME" = "None" ]; then
            echo "Failed to retrieve MediaBucketName from gatherle-s3-bucket-${STACK_SUFFIX}."
            exit 1
          fi
          S3_URL="https://${BUCKET_NAME}.s3.${AWS_REGION}.amazonaws.com"
          echo "s3_media_url=$S3_URL" >> "$GITHUB_OUTPUT"
          CDN_DOMAIN=$(aws cloudformation describe-stacks --stack-name "gatherle-s3-bucket-${STACK_SUFFIX}" --query "Stacks[0].Outputs[?OutputKey=='MediaCdnDomain'].OutputValue" --output text)
          if [ -z "$CDN_DOMAIN" ] || [ "$CDN_DOMAIN" = "None" ]; then
            echo "Failed to retrieve MediaCdnDomain from gatherle-s3-bucket-${STACK_SUFFIX}."
            exit 1
          fi
          echo "media_cdn_url=https://${CDN_DOMAIN}" >> "$GITHUB_OUTPUT"

  deploy-api:
    if: ${{ inputs.deploy_api }}
    runs-on: ubuntu-latest
    # TODO: This works because GitHub environment names are case-insensitive, but we should consider normalizing the stage input to lowercase to avoid confusion.
    environment: ${{ format('{0}-{1}', inputs.stage, inputs.region) }}
    env:
      STAGE: ${{ inputs.stage }}
      AWS_REGION: ${{ inputs.region }}
      ENABLE_CUSTOM_DOMAINS: ${{ vars.ENABLE_CUSTOM_DOMAINS || 'false' }}
      EMAIL_FROM: ${{ vars.EMAIL_FROM || 'noreply@gatherle.com' }}
      WEBAPP_URL: ${{ vars.WEBAPP_URL }}
      GOOGLE_OAUTH_CLIENT_ID_WEB: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID_WEB }}
      GOOGLE_OAUTH_CLIENT_ID_ANDROID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID_ANDROID }}
      GOOGLE_OAUTH_CLIENT_ID_IOS: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID_IOS }}
    outputs:
      graphql_url: ${{ steps.get_graphql_endpoint.outputs.graphql_url }}
      websocket_url: ${{ steps.get_websocket_endpoint.outputs.websocket_url }}
      stage_hosted_zone_name_servers: ${{ steps.get_stage_zone_nameservers.outputs.stage_hosted_zone_name_servers }}
      stack_suffix: ${{ steps.derive_suffix.outputs.stack_suffix }}
      secret_arn: ${{ steps.resolve_secret.outputs.secret_arn }}
      s3_media_url: ${{ steps.get_s3_bucket_url.outputs.s3_media_url }}
      media_cdn_url: ${{ steps.get_s3_bucket_url.outputs.media_cdn_url }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Validate Deployment Configuration
        env:
          ASSUME_ROLE_ARN: ${{ secrets.ASSUME_ROLE_ARN }}
        run: |
          test -n "${{ inputs.stage }}" || (echo "Missing required input: stage" && exit 1)
          test -n "${{ inputs.region }}" || (echo "Missing required input: region" && exit 1)
          test -n "$ASSUME_ROLE_ARN" || (echo "Missing ASSUME_ROLE_ARN secret for target environment" && exit 1)

      - name: Derive Deployment Suffix
        id: derive_suffix
        run: |
          STAGE_SEGMENT=$(echo "$STAGE" | tr '[:upper:]' '[:lower:]')
          STACK_SUFFIX="${STAGE_SEGMENT}-${AWS_REGION}"
          echo "STACK_SUFFIX=$STACK_SUFFIX" >> "$GITHUB_ENV"
          echo "stack_suffix=$STACK_SUFFIX" >> "$GITHUB_OUTPUT"

      - name: Install Dependencies
        run: npm ci

      - name: Commons TypeScript Artifacts Build
        run: npm run build:ts -w @gatherle/commons

      - name: API TypeScript Artifacts Build
        run: npm run build:ts -w @gatherle/api

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.ASSUME_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Synthesize AWS CDK
        run: npm run build:cdk -w @gatherle/cdk

      - name: Validate CDK Synth Output
        run: |
          TEMPLATE="infrastructure/cdk/cdk.out/GraphQLStack.template.json"
          if [ ! -f "$TEMPLATE" ]; then
            echo "GraphQLStack template not found at $TEMPLATE"
            exit 1
          fi
          GOOGLE_OAUTH_CLIENT_ID_WEB_IN_TEMPLATE=$(jq -r '.Resources | to_entries[] | .value.Properties.Environment.Variables.GOOGLE_OAUTH_CLIENT_ID_WEB // empty' "$TEMPLATE" 2>/dev/null | head -1)
          if [ -z "$GOOGLE_OAUTH_CLIENT_ID_WEB_IN_TEMPLATE" ]; then
            echo "ERROR: GOOGLE_OAUTH_CLIENT_ID_WEB is empty in the synthesized GraphQLStack template."
            echo "GOOGLE_OAUTH_CLIENT_ID_WEB env var present in shell: $(test -n "$GOOGLE_OAUTH_CLIENT_ID_WEB" && echo yes || echo no)"
            exit 1
          fi
          echo "GOOGLE_OAUTH_CLIENT_ID_WEB is present in synthesized template."

      - name: Resolve Backend Secret ARN
        id: resolve_secret
        run: |
          STAGE_SEGMENT=$(echo "$STAGE" | tr '[:upper:]' '[:lower:]')
          SECRET_NAME="gatherle/backend/${STAGE_SEGMENT}-${AWS_REGION}"
          SECRET_ARN=$(aws secretsmanager describe-secret --secret-id "$SECRET_NAME" --query "ARN" --output text)
          if [ -z "$SECRET_ARN" ] || [ "$SECRET_ARN" = "None" ]; then
            echo "Failed to resolve secret ARN for $SECRET_NAME."
            exit 1
          fi
          echo "SECRET_ARN=$SECRET_ARN" >> "$GITHUB_ENV"
          echo "secret_arn=$SECRET_ARN" >> "$GITHUB_OUTPUT"

      - name: Deploy AWS CDK
        run: |
          CDK_DEPLOY_STACKS=(
            SesStack
            StageInfraStack
            S3BucketStack
            GraphQLStack
            WebSocketApiStack
            MonitoringDashboardStack
            MediaStack
          )
          # Intentionally excludes SecretsManagementStack to avoid overwriting existing secrets.
          npm run cdk -w @gatherle/cdk -- deploy "${CDK_DEPLOY_STACKS[@]}" --require-approval never --exclusively

      - name: Get API Gateway endpoint
        id: get_graphql_endpoint
        run: |
          ENDPOINT=$(aws cloudformation describe-stacks --stack-name "gatherle-graphql-${STACK_SUFFIX}" --query "Stacks[0].Outputs[?OutputKey=='apiPath'].OutputValue" --output text)
          if [ -z "$ENDPOINT" ] || [ "$ENDPOINT" = "None" ]; then
            echo "Failed to retrieve GraphQL endpoint from gatherle-graphql-${STACK_SUFFIX} output apiPath."
            exit 1
          fi
          echo "graphql_url=$ENDPOINT" >> "$GITHUB_OUTPUT"

      - name: Verify GraphQL endpoint readiness
        run: |
          GRAPHQL_URL="${{ steps.get_graphql_endpoint.outputs.graphql_url }}"

          run_probe() {
            local expected_status="$1"
            local payload="$2"
            local label="$3"

            local attempts=6
            local delay_seconds=10

            for attempt in $(seq 1 "$attempts"); do
              local response_file
              response_file=$(mktemp)
              local status
              status=$(curl -sS -o "$response_file" -w '%{http_code}' \
                -H 'content-type: application/json' \
                -d "$payload" \
                "$GRAPHQL_URL" || true)

              if [ "$status" = "$expected_status" ]; then
                echo "$label probe succeeded with HTTP $status"
                rm -f "$response_file"
                return 0
              fi

              echo "$label probe attempt $attempt/$attempts returned HTTP $status"
              cat "$response_file"
              rm -f "$response_file"

              if [ "$attempt" -lt "$attempts" ]; then
                sleep "$delay_seconds"
              fi
            done

            echo "$label probe failed after $attempts attempts"
            return 1
          }

          run_probe 200 '{"query":"{ __typename }"}' 'healthy query'
          run_probe 400 '{"query":"query {"}' 'parse failure'
          run_probe 401 '{"query":"query { readRecommendedFeed { feedItemId } }"}' 'unauthenticated protected query'

      - name: Get WebSocket API endpoint
        id: get_websocket_endpoint
        run: |
          WS_ENDPOINT=$(aws cloudformation describe-stacks --stack-name "gatherle-websocket-api-${STACK_SUFFIX}" --query "Stacks[0].Outputs[?OutputKey=='websocketApiUrl'].OutputValue" --output text)
          if [ -z "$WS_ENDPOINT" ] || [ "$WS_ENDPOINT" = "None" ]; then
            echo "Failed to retrieve WebSocket endpoint from gatherle-websocket-api-${STACK_SUFFIX} output websocketApiUrl."
            exit 1
          fi
          echo "websocket_url=$WS_ENDPOINT" >> "$GITHUB_OUTPUT"

      - name: Get Stage Hosted Zone Name Servers
        id: get_stage_zone_nameservers
        run: |
          ZONE_NAME_SERVERS=$(aws cloudformation describe-stacks --stack-name "gatherle-stage-infra-${STACK_SUFFIX}" --query "Stacks[0].Outputs[?OutputKey=='stageHostedZoneNameServers'].OutputValue" --output text)
          if [ -z "$ZONE_NAME_SERVERS" ] || [ "$ZONE_NAME_SERVERS" = "None" ]; then
            echo "Failed to retrieve stageHostedZoneNameServers from gatherle-stage-infra-${STACK_SUFFIX}."
            exit 1
          fi
          echo "stage_hosted_zone_name_servers=$ZONE_NAME_SERVERS" >> "$GITHUB_OUTPUT"

      - name: Get S3 Media Bucket URL
        id: get_s3_bucket_url
        run: |
          BUCKET_NAME=$(aws cloudformation describe-stacks --stack-name "gatherle-s3-bucket-${STACK_SUFFIX}" --query "Stacks[0].Outputs[?OutputKey=='MediaBucketName'].OutputValue" --output text)
          if [ -z "$BUCKET_NAME" ] || [ "$BUCKET_NAME" = "None" ]; then
            echo "Failed to retrieve MediaBucketName from gatherle-s3-bucket-${STACK_SUFFIX}."
            exit 1
          fi
          S3_URL="https://${BUCKET_NAME}.s3.${AWS_REGION}.amazonaws.com"
          echo "s3_media_url=$S3_URL" >> "$GITHUB_OUTPUT"
          CDN_DOMAIN=$(aws cloudformation describe-stacks --stack-name "gatherle-s3-bucket-${STACK_SUFFIX}" --query "Stacks[0].Outputs[?OutputKey=='MediaCdnDomain'].OutputValue" --output text)
          if [ -z "$CDN_DOMAIN" ] || [ "$CDN_DOMAIN" = "None" ]; then
            echo "Failed to retrieve MediaCdnDomain from gatherle-s3-bucket-${STACK_SUFFIX}."
            exit 1
          fi
          echo "media_cdn_url=https://${CDN_DOMAIN}" >> "$GITHUB_OUTPUT"

  e2e-api-events:
    if: ${{ inputs.deploy_api }}
    needs: [deploy-api]
    runs-on: ubuntu-latest
    environment: ${{ format('{0}-{1}', inputs.stage, inputs.region) }}
    env:
      STAGE: ${{ inputs.stage }}
      AWS_REGION: ${{ inputs.region }}
      E2E_API_SHARD: 1-of-3
      E2E_USER_NAMESPACE: gha-${{ github.run_id }}-${{ github.run_attempt }}-shard-1
      EMAIL_FROM: ${{ vars.EMAIL_FROM || 'noreply@gatherle.com' }}
      WEBAPP_URL: ${{ vars.WEBAPP_URL }}
      SECRET_ARN: ${{ needs.deploy-api.outputs.secret_arn }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      GATHERLE_TEST_ADMIN_PASSWORD: ${{ secrets.GATHERLE_TEST_ADMIN_PASSWORD }}
      GATHERLE_TEST_USER_PASSWORD: ${{ secrets.GATHERLE_TEST_USER_PASSWORD }}
      GATHERLE_TEST_USER2_PASSWORD: ${{ secrets.GATHERLE_TEST_USER2_PASSWORD }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Commons TypeScript Artifacts Build
        run: npm run build:ts -w @gatherle/commons

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.ASSUME_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run API E2E Tests (Shard 1/3)
        env:
          GRAPHQL_URL: ${{ needs.deploy-api.outputs.graphql_url }}
        run: npm run test:e2e:api -- --shard=1/3 --maxWorkers=1

  e2e-api-discovery:
    if: ${{ inputs.deploy_api }}
    needs: [deploy-api]
    runs-on: ubuntu-latest
    environment: ${{ format('{0}-{1}', inputs.stage, inputs.region) }}
    env:
      STAGE: ${{ inputs.stage }}
      AWS_REGION: ${{ inputs.region }}
      E2E_API_SHARD: 2-of-3
      E2E_USER_NAMESPACE: gha-${{ github.run_id }}-${{ github.run_attempt }}-shard-2
      EMAIL_FROM: ${{ vars.EMAIL_FROM || 'noreply@gatherle.com' }}
      WEBAPP_URL: ${{ vars.WEBAPP_URL }}
      SECRET_ARN: ${{ needs.deploy-api.outputs.secret_arn }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      GATHERLE_TEST_ADMIN_PASSWORD: ${{ secrets.GATHERLE_TEST_ADMIN_PASSWORD }}
      GATHERLE_TEST_USER_PASSWORD: ${{ secrets.GATHERLE_TEST_USER_PASSWORD }}
      GATHERLE_TEST_USER2_PASSWORD: ${{ secrets.GATHERLE_TEST_USER2_PASSWORD }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Commons TypeScript Artifacts Build
        run: npm run build:ts -w @gatherle/commons

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.ASSUME_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run API E2E Tests (Shard 2/3)
        env:
          GRAPHQL_URL: ${{ needs.deploy-api.outputs.graphql_url }}
        run: npm run test:e2e:api -- --shard=2/3 --maxWorkers=1

  e2e-api-user-org:
    if: ${{ inputs.deploy_api }}
    needs: [deploy-api]
    runs-on: ubuntu-latest
    environment: ${{ format('{0}-{1}', inputs.stage, inputs.region) }}
    env:
      STAGE: ${{ inputs.stage }}
      AWS_REGION: ${{ inputs.region }}
      E2E_API_SHARD: 3-of-3
      E2E_USER_NAMESPACE: gha-${{ github.run_id }}-${{ github.run_attempt }}-shard-3
      EMAIL_FROM: ${{ vars.EMAIL_FROM || 'noreply@gatherle.com' }}
      WEBAPP_URL: ${{ vars.WEBAPP_URL }}
      SECRET_ARN: ${{ needs.deploy-api.outputs.secret_arn }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      GATHERLE_TEST_ADMIN_PASSWORD: ${{ secrets.GATHERLE_TEST_ADMIN_PASSWORD }}
      GATHERLE_TEST_USER_PASSWORD: ${{ secrets.GATHERLE_TEST_USER_PASSWORD }}
      GATHERLE_TEST_USER2_PASSWORD: ${{ secrets.GATHERLE_TEST_USER2_PASSWORD }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Commons TypeScript Artifacts Build
        run: npm run build:ts -w @gatherle/commons

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.ASSUME_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run API E2E Tests (Shard 3/3)
        env:
          GRAPHQL_URL: ${{ needs.deploy-api.outputs.graphql_url }}
        run: npm run test:e2e:api -- --shard=3/3 --maxWorkers=1

  deploy-webapp:
    if: >-
      ${{
        always() &&
        inputs.deploy_webapp &&
        (needs.resolve-deploy-context.result == 'success' || needs.resolve-deploy-context.result == 'skipped') &&
        (needs.deploy-api.result == 'success' || needs.deploy-api.result == 'skipped') &&
        (needs.e2e-api-events.result == 'success' || needs.e2e-api-events.result == 'skipped') &&
        (needs.e2e-api-discovery.result == 'success' || needs.e2e-api-discovery.result == 'skipped') &&
        (needs.e2e-api-user-org.result == 'success' || needs.e2e-api-user-org.result == 'skipped')
      }}
    needs:
      [
        resolve-deploy-context,
        deploy-api,
        e2e-api-events,
        e2e-api-discovery,
        e2e-api-user-org,
      ]
    runs-on: ubuntu-latest
    environment: ${{ format('{0}-{1}', inputs.stage, inputs.region) }}
    env:
      STAGE: ${{ inputs.stage }}
      AWS_REGION: ${{ inputs.region }}
    outputs:
      deployment_url: ${{ steps.deploy_webapp.outputs.deployment_url }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        working-directory: ./apps/webapp
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Preview to Vercel
        id: deploy_webapp
        working-directory: ./apps/webapp
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_GRAPHQL_URL: ${{ needs.deploy-api.outputs.graphql_url || needs.resolve-deploy-context.outputs.graphql_url }}
          NEXT_PUBLIC_WEBSOCKET_URL: ${{ needs.deploy-api.outputs.websocket_url || needs.resolve-deploy-context.outputs.websocket_url }}
          NEXT_PUBLIC_S3_MEDIA_URL: ${{ needs.deploy-api.outputs.s3_media_url || needs.resolve-deploy-context.outputs.s3_media_url }}
          NEXT_PUBLIC_MEDIA_CDN_URL: ${{ needs.deploy-api.outputs.media_cdn_url || needs.resolve-deploy-context.outputs.media_cdn_url }}
          GOOGLE_OAUTH_CLIENT_ID_WEB: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID_WEB }}
          GOOGLE_OAUTH_CLIENT_SECRET_WEB: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET_WEB }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
        run: |
          vercel deploy --yes --token=${{ secrets.VERCEL_TOKEN }} \
            --build-env NEXT_PUBLIC_GRAPHQL_URL="$NEXT_PUBLIC_GRAPHQL_URL" \
            --build-env NEXT_PUBLIC_WEBSOCKET_URL="$NEXT_PUBLIC_WEBSOCKET_URL" \
            --build-env NEXT_PUBLIC_S3_MEDIA_URL="$NEXT_PUBLIC_S3_MEDIA_URL" \
            --build-env NEXT_PUBLIC_MEDIA_CDN_URL="$NEXT_PUBLIC_MEDIA_CDN_URL" \
            --env GOOGLE_OAUTH_CLIENT_ID_WEB="$GOOGLE_OAUTH_CLIENT_ID_WEB" \
            --env GOOGLE_OAUTH_CLIENT_SECRET_WEB="$GOOGLE_OAUTH_CLIENT_SECRET_WEB" \
            --env NEXTAUTH_SECRET="$NEXTAUTH_SECRET" \
            > deployment-url.txt
          DEPLOYMENT_URL=$(grep -Eo 'https://[^[:space:]]+' deployment-url.txt | grep -Ev '^https://vercel\.com/' | tail -n 1)
          if [ -z "$DEPLOYMENT_URL" ]; then
            DEPLOYMENT_URL=$(grep -Eo 'https://[^[:space:]]+' deployment-url.txt | tail -n 1)
          fi
          if [ -z "$DEPLOYMENT_URL" ]; then
            echo "Failed to capture deployment URL from Vercel CLI output."
            echo "Captured output:"
            cat deployment-url.txt
            exit 1
          fi
          echo "deployment_url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"

      - name: Alias Webapp Custom Domain in Vercel
        if: ${{ inputs.web_domain_alias != '' }}
        working-directory: ./apps/webapp
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          DEPLOYMENT_URL="${{ steps.deploy_webapp.outputs.deployment_url }}"
          if [ -z "$DEPLOYMENT_URL" ]; then
            echo "Missing deployment URL for Vercel alias."
            exit 1
          fi
          vercel alias set "$DEPLOYMENT_URL" "${{ inputs.web_domain_alias }}" --token=${{ secrets.VERCEL_TOKEN }}

      - name: Verify Webapp Custom Domain
        if: ${{ inputs.web_domain_alias != '' }}
        run: |
          curl -fsSIL "https://${{ inputs.web_domain_alias }}" | head -n 1

      - name: Verify Captured Deployment URL
        run: |
          DEPLOYMENT_URL="${{ steps.deploy_webapp.outputs.deployment_url }}"
          if [ -z "$DEPLOYMENT_URL" ]; then
            echo "PLAYWRIGHT_BASE_URL is empty."
            exit 1
          fi
          curl -fsSIL "$DEPLOYMENT_URL" | head -n 1

  e2e-webapp:
    needs: [deploy-webapp]
    if: ${{ always() && inputs.deploy_webapp && needs.deploy-webapp.result == 'success' }}
    runs-on: ubuntu-latest
    environment: ${{ format('{0}-{1}', inputs.stage, inputs.region) }}
    env:
      STAGE: ${{ inputs.stage }}
      AWS_REGION: ${{ inputs.region }}
      EXPO_PUBLIC_GOOGLE_OAUTH_CLIENT_ID_WEB: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID_WEB }}
      EXPO_PUBLIC_GOOGLE_OAUTH_CLIENT_ID_ANDROID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID_ANDROID }}
      EXPO_PUBLIC_GOOGLE_OAUTH_CLIENT_ID_IOS: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID_IOS }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Resolve Playwright Version
        id: playwright-version
        working-directory: ./apps/webapp
        run: |
          VERSION="$(node -p "const pkg = require('./package.json'); pkg.devDependencies?.['@playwright/test'] ?? pkg.dependencies?.['@playwright/test'] ?? ''")"
          if [ -z "$VERSION" ]; then
            echo "Unable to resolve @playwright/test version for cache key."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright System Dependencies
        working-directory: ./apps/webapp
        run: npx playwright install-deps chromium

      - name: Install Playwright Browser
        working-directory: ./apps/webapp
        run: npx playwright install chromium

      - name: Run Webapp E2E Tests
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy-webapp.outputs.deployment_url }}
        run: npm run test:e2e:web

  build-android-apk:
    if: >-
      ${{
        always() &&
        inputs.build_mobile &&
        (needs.resolve-deploy-context.result == 'success' || needs.resolve-deploy-context.result == 'skipped') &&
        (needs.deploy-api.result == 'success' || needs.deploy-api.result == 'skipped') &&
        (needs.e2e-api-events.result == 'success' || needs.e2e-api-events.result == 'skipped') &&
        (needs.e2e-api-discovery.result == 'success' || needs.e2e-api-discovery.result == 'skipped') &&
        (needs.e2e-api-user-org.result == 'success' || needs.e2e-api-user-org.result == 'skipped')
      }}
    needs:
      [
        resolve-deploy-context,
        deploy-api,
        e2e-api-events,
        e2e-api-discovery,
        e2e-api-user-org,
      ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment: ${{ format('{0}-{1}', inputs.stage, inputs.region) }}
    env:
      STAGE: ${{ inputs.stage }}
      AWS_REGION: ${{ inputs.region }}
      EXPO_PUBLIC_GOOGLE_OAUTH_CLIENT_ID_WEB: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID_WEB }}
      EXPO_PUBLIC_GOOGLE_OAUTH_CLIENT_ID_ANDROID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID_ANDROID }}
      EXPO_PUBLIC_GOOGLE_OAUTH_CLIENT_ID_IOS: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID_IOS }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install Dependencies
        run: npm ci

      - name: Generate Mobile GraphQL Artifacts
        working-directory: ./apps/mobile
        env:
          EXPO_PUBLIC_GRAPHQL_URL: ${{ needs.deploy-api.outputs.graphql_url || needs.resolve-deploy-context.outputs.graphql_url }}
        run: npm run codegen

      - name: Expo Prebuild (Android)
        working-directory: ./apps/mobile
        run: npx expo prebuild --no-install --platform android

      - name: Materialize Android Release Keystore
        working-directory: ./apps/mobile
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_RELEASE_KEYSTORE_BASE64" || (echo "Missing ANDROID_RELEASE_KEYSTORE_BASE64 secret" && exit 1)
          mkdir -p credentials/android
          printf '%s' "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > credentials/android/ci-release.keystore.jks

      - name: Prepare Android Release Signing
        working-directory: ./apps/mobile
        env:
          ANDROID_RELEASE_KEYSTORE_PATH: credentials/android/ci-release.keystore.jks
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: npm run android:prepare:release-signing

      - name: Cache Gradle Packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            apps/mobile/android/.gradle
          key:
            gradle-${{ runner.os }}-${{ hashFiles('apps/mobile/package.json', 'package-lock.json',
            'apps/mobile/android/**/*.gradle*', 'apps/mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build Android Release APK
        working-directory: ./apps/mobile
        env:
          EXPO_PUBLIC_GRAPHQL_URL: ${{ needs.deploy-api.outputs.graphql_url || needs.resolve-deploy-context.outputs.graphql_url }}
          EXPO_PUBLIC_WEBSOCKET_URL: ${{ needs.deploy-api.outputs.websocket_url || needs.resolve-deploy-context.outputs.websocket_url }}
          EXPO_PUBLIC_GOOGLE_OAUTH_CLIENT_ID_WEB: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID_WEB }}
          EXPO_PUBLIC_GOOGLE_OAUTH_CLIENT_ID_ANDROID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID_ANDROID }}
          EXPO_PUBLIC_GOOGLE_OAUTH_CLIENT_ID_IOS: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID_IOS }}
        run:
          ./android/gradlew -p android app:assembleRelease -PreactNativeArchitectures=arm64-v8a --build-cache --parallel
          -Dorg.gradle.caching=true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-${{ inputs.stage }}-${{ github.sha }}
          name: Android ${{ inputs.stage }} — ${{ github.sha }}
          files: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: false
